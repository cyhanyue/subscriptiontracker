<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Subscription Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4"
      style="background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 50%, #faf5ff 100%);">

  <div class="w-full max-w-sm">

    <!-- Logo / Icon -->
    <div class="text-center mb-8">
      <div class="w-16 h-16 rounded-2xl bg-white shadow-md shadow-violet-100 border border-violet-100 flex items-center justify-center text-3xl mx-auto mb-4">
        🌸
      </div>
      <h1 class="text-xl font-semibold text-violet-900">Subscription Tracker</h1>
      <p class="text-sm text-violet-400 mt-1">your spending, simplified</p>
    </div>

    <!-- Card -->
    <div class="bg-white/80 backdrop-blur-md rounded-3xl border border-violet-100 shadow-lg shadow-violet-100 p-7">

      {% if error %}
        <div class="bg-rose-50 border border-rose-200 text-rose-500 text-sm rounded-2xl px-4 py-3 mb-5">
          {{ error }}
        </div>
      {% endif %}

      <form method="POST" action="/login" class="space-y-4">
        <div>
          <label class="block text-xs font-medium text-violet-500 mb-1.5">Password</label>
          <input type="password" name="password" autofocus required
                 placeholder="••••••••"
                 class="w-full border border-violet-200 rounded-xl px-3.5 py-2.5 text-sm text-violet-900 placeholder-violet-300
                        focus:outline-none focus:ring-2 focus:ring-violet-400 focus:border-transparent transition" />
        </div>
        <button type="submit"
                class="w-full bg-violet-500 hover:bg-violet-600 text-white text-sm font-medium py-2.5 rounded-xl
                       shadow-sm shadow-violet-200 transition mt-1">
          Sign in
        </button>
      </form>
    </div>

  </div>

</body>
</html>
